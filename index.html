<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Simulator</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; background: #fff; color: #1a1a1a; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
    .ctrl { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .ctrl label { font-size: 13px; color: #666; width: 130px; flex-shrink: 0; }
    .ctrl input[type=range] { flex: 1; }
    .ctrl select { flex: 1; font-size: 13px; padding: 4px 8px; border: 0.5px solid #ccc; border-radius: 6px; }
    .ctrl .val { font-size: 13px; font-weight: 500; min-width: 52px; text-align: right; color: #1a1a1a; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #f5f5f3; border-radius: 8px; padding: 0.75rem 1rem; }
    .stat .lbl { font-size: 12px; color: #666; margin-bottom: 4px; }
    .stat .num { font-size: 20px; font-weight: 500; color: #1a1a1a; }
    .stat .num.green { color: #1D9E75; }
    .legend { display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: #666; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>Compound interest</h1>

  <div class="ctrl">
    <label>Initial deposit</label>
    <input type="range" id="principal" min="1000" max="50000" step="1000" value="10000">
    <span class="val" id="principalOut">$10,000</span>
  </div>
  <div class="ctrl">
    <label>Annual rate</label>
    <input type="range" id="rate" min="1" max="20" step="0.5" value="7">
    <span class="val" id="rateOut">7%</span>
  </div>
  <div class="ctrl">
    <label>Years</label>
    <input type="range" id="years" min="1" max="40" step="1" value="20">
    <span class="val" id="yearsOut">20 yrs</span>
  </div>
  <div class="ctrl">
    <label>Compounds</label>
    <select id="freq">
      <option value="1">Annually</option>
      <option value="4">Quarterly</option>
      <option value="12" selected>Monthly</option>
      <option value="365">Daily</option>
    </select>
    <span class="val"></span>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Final balance</div><div class="num" id="total">-</div></div>
    <div class="stat"><div class="lbl">Amount deposited</div><div class="num" id="deposited">-</div></div>
    <div class="stat"><div class="lbl">Interest earned</div><div class="num green" id="gained">-</div></div>
  </div>

  <div style="position: relative; width: 100%; height: 260px;">
    <canvas id="chart"></canvas>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#3266ad;"></span>Total balance</span>
    <span><span class="legend-dot" style="background:#73726c;"></span>Principal</span>
    <span><span class="legend-dot" style="background:#1D9E75;"></span>Interest earned</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const fmt = v => '$' + Math.round(v).toLocaleString();

    function calc(p, r, n, t) {
      return p * Math.pow(1 + r / n, n * t);
    }

    let chartInst;

    function update() {
      const p = +document.getElementById('principal').value;
      const r = +document.getElementById('rate').value / 100;
      const n = +document.getElementById('freq').value;
      const t = +document.getElementById('years').value;

      document.getElementById('principalOut').textContent = fmt(p);
      document.getElementById('rateOut').textContent = (+document.getElementById('rate').value).toFixed(1) + '%';
      document.getElementById('yearsOut').textContent = t + ' yrs';

      const finalBal = calc(p, r, n, t);
      const interest = finalBal - p;

      document.getElementById('total').textContent = fmt(finalBal);
      document.getElementById('deposited').textContent = fmt(p);
      document.getElementById('gained').textContent = '+' + fmt(interest);

      const labels = [], balData = [], principalData = [], interestData = [];
      for (let y = 0; y <= t; y++) {
        labels.push('Yr ' + y);
        const bal = calc(p, r, n, y);
        balData.push(Math.round(bal));
        principalData.push(Math.round(p));
        interestData.push(Math.round(bal - p));
      }

      const datasets = [
        { label: 'Interest', data: interestData, backgroundColor: '#1D9E7566', borderColor: '#1D9E75', borderWidth: 1.5, fill: false, tension: 0.4, pointRadius: 0 },
        { label: 'Principal', data: principalData, backgroundColor: '#73726c55', borderColor: '#73726c', borderWidth: 1.5, fill: false, tension: 0, pointRadius: 0 },
        { label: 'Total', data: balData, backgroundColor: '#3266ad22', borderColor: '#3266ad', borderWidth: 2, fill: false, tension: 0.4, pointRadius: 0 }
      ];

      if (chartInst) {
        chartInst.data.labels = labels;
        chartInst.data.datasets = datasets;
        chartInst.update();
      } else {
        chartInst = new Chart(document.getElementById('chart'), {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { autoSkip: true, maxTicksLimit: 10, font: { size: 11 } }, grid: { display: false } },
              y: { ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v), font: { size: 11 } }, grid: { color: '#88878033' } }
            }
          }
        });
      }
    }

    ['principal','rate','years','freq'].forEach(id => {
      document.getElementById(id).addEventListener('input', update);
    });

    update();
  </script>
</body>
</html>
